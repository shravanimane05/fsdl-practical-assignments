<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionHub | Official Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold px-3" href="#">FASHION<span class="text-warning">HUB</span></a>
            
            <div class="d-flex align-items-center ms-auto gap-2">
                <button class="btn btn-outline-light position-relative" data-bs-toggle="offcanvas" data-bs-target="#wishlistSidebar">
                    <i class="bi bi-heart-fill"></i>
                    <span id="wishlist-count" class="badge bg-danger rounded-pill">0</span>
                </button>
                <button class="btn btn-warning fw-bold position-relative d-flex align-items-center gap-2" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">
                    <i class="bi bi-bag-heart-fill"></i>
                    <span class="d-none d-md-inline">BAG</span>
                    <span id="cart-count" class="badge bg-danger rounded-pill">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="bg-white py-3 border-bottom shadow-sm">
        <div class="container d-flex justify-content-center flex-wrap gap-2">
            <button class="btn btn-dark filter-btn rounded-pill px-4" onclick="filterItems('all', this)">All Collections</button>
            <button class="btn btn-outline-dark filter-btn rounded-pill px-4" onclick="filterItems('Clothing', this)">Clothing</button>
            <button class="btn btn-outline-dark filter-btn rounded-pill px-4" onclick="filterItems('Footwear', this)">Footwear</button>
            <button class="btn btn-outline-dark filter-btn rounded-pill px-4" onclick="filterItems('Accessories', this)">Accessories</button>
        </div>
    </div>

    <main class="container my-5">
        <div class="row g-4" id="product-grid"></div>
    </main>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar">
        <div class="offcanvas-header bg-dark text-white">
            <h5 class="offcanvas-title fw-bold">YOUR SHOPPING BAG</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cart-items-list" class="flex-grow-1 overflow-auto"></div>
            <div class="border-top pt-4 mt-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="h5 mb-0">Subtotal:</span>
                    <span class="h4 mb-0 fw-bold text-success" id="cart-total">₹0</span>
                </div>
                <button class="btn btn-dark w-100 py-3 fw-bold shadow-sm" onclick="checkout()">CONFIRM ORDER</button>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="wishlistSidebar">
        <div class="offcanvas-header bg-danger text-white">
            <h5 class="offcanvas-title fw-bold">MY WISHLIST</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div id="wishlist-items-list"></div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">
                    Item added!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
